name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: 0.5.2
  MDBOOK_KATEX_VERSION: 0.10.0-alpha
  MDBOOK_MERMAID_VERSION: 0.17.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache Cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-katex
            ~/.cargo/bin/mdbook-mermaid
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-mdbook-${{ env.MDBOOK_VERSION }}-katex-${{ env.MDBOOK_KATEX_VERSION }}-mermaid-${{ env.MDBOOK_MERMAID_VERSION }}

      - name: Install mdBook
        run: |
          command -v mdbook >/dev/null || cargo install mdbook --version "$MDBOOK_VERSION" --locked
          command -v mdbook-katex >/dev/null || cargo install mdbook-katex --version "$MDBOOK_KATEX_VERSION" --locked
          command -v mdbook-mermaid >/dev/null || cargo install mdbook-mermaid --version "$MDBOOK_MERMAID_VERSION" --locked

      - name: Build
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
